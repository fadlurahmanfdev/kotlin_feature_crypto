name: Release & Publish To Maven Central

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    environment: MavenCentral
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Android instrumented tests
        uses: ./.github/actions/setup-android-emulator

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION=$(sed -n 's/.*coordinates([^,]*,[^,]*, "\([^"]*\)".*/\1/p' crypto_vault/build.gradle.kts)
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Maven Central and GPG key
        uses: ./.github/actions/setup-maven-central
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_key_id: ${{ vars.GPG_KEY_ID }}
          gpg_key_password: ${{ secrets.GPG_KEY_PASSWORD }}
          maven_central_username: ${{ vars.MAVEN_CENTRAL_TOKEN_USERNAME }}
          maven_central_password: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}

      - name: Publish to Maven Central
        shell: bash
        run: |
          ./gradlew clean
          chmod +x update_version.sh
          ./update_version.sh crypto_vault/build.gradle.kts "${{ steps.version.outputs.current_version }}" "${{ steps.version.outputs.release_version }}"
          ./gradlew :crypto_vault:publishMavenPublicationToMavenCentralRepository

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          if [ -n "${PREVIOUS_TAG}" ]; then
            {
              echo "## Changes since ${PREVIOUS_TAG}"
              echo ""
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)"
            } > "${NOTES_FILE}"
          else
            {
              echo "## Recent changes"
              echo ""
              git log -10 --pretty=format:"- %s (%h)"
            } > "${NOTES_FILE}"
          fi

          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.release_version }}
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
